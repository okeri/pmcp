name: pmcp build
on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        setup:
          - defs: ''
            deps: ''
          
          - defs: '-Dspectralizer=mkl'
            deps: 'libmkl-dev'
          
          - defs: '-Dspectralizer=fftw'
            deps: 'libfftw3-dev'
          
        glyr: ['', 'libglyr-dev']

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update -q
          sudo apt install -y g++-13 meson ninja-build libpipewire-0.3-dev libsndfile1-dev libtag1-dev ${{matrix.glyr}} ${{matrix.setup.deps}}
          git clone https://github.com/marzer/tomlplusplus
          pushd tomlplusplus
          meson setup -Dbuild_lib=true build
          meson compile -C build
          sudo meson install -C build
          popd
        shell: bash

      - name: Configure and build the app
        run: |
          meson setup ${{matrix.setup.defs}} build
          meson compile -C build
        env:
          CXX: g++-13
